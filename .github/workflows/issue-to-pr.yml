name: Issue to Terraform PR

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number in the source repo'
        required: true
        type: number
      source_repo:
        description: 'Repo containing the issue (e.g. time4116/iac-smith-demo-infra)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  issues: read

concurrency:
  group: iac-smith-issue-${{ inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  iac-smith:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'time4116') ||
      (github.event_name == 'issues' && github.event.label.name == 'iac-smith' && github.actor == 'time4116')
    runs-on: ubuntu-latest
    env:
      IAC_SMITH_ALLOWED_TARGET_REPO: time4116/iac-smith-demo-infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
      - name: Install terragrunt (latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TERRAGRUNT_VERSION=$(curl -sL -H "Authorization: Bearer ${GH_TOKEN}" "https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          echo "Installed terragrunt ${TERRAGRUNT_VERSION}"
      - name: Configure AWS credentials for Bedrock
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_NON_PROD }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - run: uv sync --locked
      - name: Run IaC Smith
        env:
          IAC_SMITH_TARGET_REPO_TOKEN: ${{ secrets.IAC_SMITH_TARGET_REPO_PAT }}
          IAC_SMITH_GITHUB_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.IAC_SMITH_TARGET_REPO_PAT || github.token }}
          IAC_SMITH_SOURCE_REPO: ${{ inputs.source_repo || github.repository }}
          IAC_SMITH_ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
          IAC_SMITH_TARGET_REPO: time4116/iac-smith-demo-infra
        run: uv run python -m iac_smith.cli
