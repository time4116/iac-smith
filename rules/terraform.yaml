rules:
  - id: terraform-provider-version-pins
    severity: error
    description: Terraform providers and community modules must use explicit version constraints.
  - id: terraform-docs-markers
    severity: warning
    description: Generated module READMEs should include terraform-docs markers.
  - id: prefer-community-modules
    severity: preference
    description: Prefer maintained terraform-aws-modules where appropriate.
  - id: foundation-module-scope
    severity: warning
    description: Foundation modules own shared AWS primitives that downstream stacks depend on, such as VPCs, subnets, route tables, NAT gateways, internet gateways, and explicitly shared network-boundary security groups. Foundation modules must not create workload security groups, ALBs, target groups/listeners, CloudWatch log groups, ECS clusters, task definitions, ECS services, or workload IAM.
  - id: workload-modules-depend-on-foundation
    severity: warning
    description: Workload-specific modules should not hide foundation resources inside narrowly scoped names like ecs-fargate; they should depend on foundation outputs unless the issue explicitly requests another established repo pattern.
  - id: no-duplicate-provider-resource-names
    severity: error
    description: Generated modules must not declare the same AWS resource type with the same provider-level name across module roots. Move the shared resource to one owner module and pass IDs through Terragrunt dependency outputs, or use distinct names for genuinely separate resources.
  - id: module-name-scope-alignment
    severity: warning
    description: Generated module names must match the primary ownership boundary of the resources inside them; split broad mixed-resource stacks into appropriately scoped modules.
